events {}

http {
  # Allow WebSocket upgrade.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  resolver 127.0.0.11 valid=2s ipv6=off;

  upstream api_cluster {
    # Hard-coded replicas. docker-compose with --scale=3 always creates these
    # names. If a name doesn't resolve at startup, nginx will retry on next
    # request via the resolver.
    server note_manager_backend-api-1:4000 max_fails=1 fail_timeout=2s;
    server note_manager_backend-api-2:4000 max_fails=1 fail_timeout=2s;
    server note_manager_backend-api-3:4000 max_fails=1 fail_timeout=2s;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://api_cluster;

      # Expose which backend handled the request. The demo uses this to show
      # load distribution across the cluster.
      add_header X-Served-By $upstream_addr always;

      # If an upstream is dead, transparently retry on the next one. This is
      # what makes node-death invisible to the client during the chaos demo.
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_next_upstream_timeout 5s;
      proxy_connect_timeout 1s;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support for Phoenix LiveView / channels.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
