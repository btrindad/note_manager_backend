services:
  api-init:
    image: note-manager:latest
    build: ./
    environment:
      DATABASE_URL: "ecto://postgres:super_secret_db_pass@prod-db/note_manager"
      SECRET_KEY_BASE: MUjY6NsLqalotWKLpOu4YUuaxJnJCzLwY6BXeZiGZ+fDdPuiP692053kCNEy5Em4
    networks:
      - prod
    command:
      - "/app/bin/migrate"
    depends_on:
      prod-db:
        condition: service_healthy

  api:
    image: note-manager:latest
    build: ./
    environment:
      DATABASE_URL: "ecto://postgres:super_secret_db_pass@prod-db/note_manager"
      SECRET_KEY_BASE: MUjY6NsLqalotWKLpOu4YUuaxJnJCzLwY6BXeZiGZ+fDdPuiP692053kCNEy5Em4
      BUMBLEE_CACHE_DIR: "/app/models"
      # Cluster wiring — all replicas share the cookie and discover via Docker DNS.
      RELEASE_COOKIE: "demo-cluster-cookie-please-change"
      DNS_CLUSTER_QUERY: "api"
      PHX_HOST: "localhost"
    networks:
      - prod
    depends_on:
      api-init:
        condition: service_completed_successfully
      prod-db:
        condition: service_healthy
    volumes:
      - model_cache:/app/models

  nginx:
    image: nginx:alpine
    ports:
      - "4000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - prod
    depends_on:
      - api

  prod-db:
    image: pgvector/pgvector:pg18
    volumes:
      - pg_data_prod:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secret_db_pass
      POSTGRES_DB: note_manager
    networks:
      - prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data_prod:
  model_cache:

networks:
  prod:
